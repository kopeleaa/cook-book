methods:
  createIngredient:
    post:
      tags:
        - Ingredient
      summary: Create a new ingredient
      operationId: createIngredient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngredientDTO'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngredientDTO'

components:
  schemas:
    IngredientDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        unit:
          type: string
        type:
          type: string